# .github/workflows/ci.yml
name: CI/CD Pipeline
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      # Install dependencies
      - run: npm ci
      
      # Lint and type check
      - run: npm run lint
      - run: npm run typecheck
      
      # Build
      - run: npm run build
